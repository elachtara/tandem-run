<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Waitlist — Neighborhood Map · Tandem Run</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; }
    #map { width: 100vw; height: 100vh; }

    .info-card {
      position: absolute;
      top: 1.5rem; left: 1.5rem;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(28, 63, 122, 0.15);
      border-radius: 6px;
      padding: 1.25rem 1.5rem;
      max-width: 240px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .info-card h1 { font-size: 0.95rem; font-weight: 600; color: #1c3f7a; margin-bottom: 0.3rem; }
    .info-card p  { font-size: 0.73rem; color: #78726a; line-height: 1.6; margin-bottom: 1rem; }

    .legend-title { font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; color: #1c3f7a; font-weight: 600; margin-bottom: 0.5rem; }
    .legend-bar {
      height: 10px; border-radius: 5px;
      background: linear-gradient(to right, rgba(28,63,122,0.08), rgba(28,63,122,0.4), rgba(28,63,122,0.85));
      margin-bottom: 0.3rem;
    }
    .legend-labels { display: flex; justify-content: space-between; font-size: 0.68rem; color: #aaa; }

    .bubble-tooltip {
      background: white;
      border: 1px solid rgba(28, 63, 122, 0.2);
      border-radius: 4px;
      padding: 0.35rem 0.6rem;
      font-size: 0.76rem;
      color: #1a1814;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .bubble-tooltip::before { display: none; }
    .bubble-tooltip strong { color: #1c3f7a; display: block; }

    .leaflet-control-zoom a { background: white !important; color: #1c3f7a !important; border-color: rgba(28,63,122,0.2) !important; }
    .leaflet-control-attribution { font-size: 9px !important; }
  </style>
</head>
<body>

<div id="map"></div>

<div class="info-card">
  <h1>Where are they?</h1>
  <p>First 100 waitlist sign-ups. Darker areas = more signups. Hover a dot for exact count.</p>
  <div class="legend-title">Signup density</div>
  <div class="legend-bar"></div>
  <div class="legend-labels"><span>Fewer</span><span>More</span></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<script>
  const map = L.map('map', {
    center: [42.355, -71.09],
    zoom: 12,
    zoomControl: true,
    scrollWheelZoom: true,
    attributionControl: true
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://carto.com/">CARTO</a> &copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  const neighborhoods = [
    { name: 'Charlestown',        lat: 42.3782, lon: -71.0602, count: 15 },
    { name: 'North End',          lat: 42.3647, lon: -71.0542, count: 12 },
    { name: 'Beacon Hill',        lat: 42.3588, lon: -71.0707, count: 9  },
    { name: 'Brighton',           lat: 42.3518, lon: -71.1545, count: 8  },
    { name: 'East Cambridge',     lat: 42.3676, lon: -71.0905, count: 6  },
    { name: 'East Boston',        lat: 42.3736, lon: -71.0390, count: 5  },
    { name: 'Allston',            lat: 42.3538, lon: -71.1328, count: 3  },
    { name: 'Dorchester',         lat: 42.3021, lon: -71.0657, count: 3  },
    { name: 'Jamaica Plain',      lat: 42.3103, lon: -71.1132, count: 3  },
    { name: 'Davis Square',       lat: 42.3967, lon: -71.1222, count: 2  },
    { name: 'West Cambridge',     lat: 42.3779, lon: -71.1414, count: 2  },
    { name: 'Cambridgeport',      lat: 42.3626, lon: -71.1105, count: 2  },
    { name: 'Assembly Row',       lat: 42.3953, lon: -71.0773, count: 2  },
    { name: 'South Boston',       lat: 42.3380, lon: -71.0436, count: 2  },
    { name: 'Hingham',            lat: 42.2421, lon: -70.8900, count: 2  },
    { name: 'Seaport',            lat: 42.3502, lon: -71.0437, count: 1  },
    { name: 'Winter Hill',        lat: 42.3928, lon: -71.0984, count: 1  },
    { name: 'Inman Square',       lat: 42.3735, lon: -71.1027, count: 1  },
    { name: 'Cambridge Crossing', lat: 42.3746, lon: -71.0760, count: 1  },
    { name: 'Kendall Square',     lat: 42.3623, lon: -71.0875, count: 1  },
    { name: 'South End',          lat: 42.3416, lon: -71.0743, count: 1  },
    { name: 'Union Square',       lat: 42.3788, lon: -71.0988, count: 1  },
    { name: 'Medford',            lat: 42.4184, lon: -71.1062, count: 1  },
    { name: 'Newton',             lat: 42.3370, lon: -71.2092, count: 1  },
    { name: 'Back Bay',           lat: 42.3503, lon: -71.0810, count: 1  },
    { name: 'Brookline',          lat: 42.3317, lon: -71.1213, count: 1  },
    { name: 'Porter Square',      lat: 42.3884, lon: -71.1192, count: 1  },
    { name: 'Mid Cambridge',      lat: 42.3780, lon: -71.1099, count: 1  },
  ];

  const maxCount = Math.max(...neighborhoods.map(n => n.count));

  // Heatmap layer
  const heatData = neighborhoods.map(({ lat, lon, count }) => [lat, lon, count / maxCount]);

  L.heatLayer(heatData, {
    radius: 55,
    blur: 45,
    maxZoom: 13,
    max: 1.0,
    gradient: {
      0.0: 'rgba(28,63,122,0)',
      0.2: 'rgba(28,63,122,0.12)',
      0.5: 'rgba(28,63,122,0.45)',
      0.8: 'rgba(28,63,122,0.72)',
      1.0: 'rgba(28,63,122,0.92)'
    }
  }).addTo(map);

  // Small dot markers for hover tooltips
  neighborhoods.forEach(({ name, lat, lon, count }) => {
    L.circleMarker([lat, lon], {
      radius: 5,
      color: '#1c3f7a',
      weight: 1.5,
      fillColor: 'white',
      fillOpacity: 0.85,
    })
    .bindTooltip(
      `<strong>${name}</strong>${count} signup${count !== 1 ? 's' : ''}`,
      { sticky: true, direction: 'top', className: 'bubble-tooltip' }
    )
    .addTo(map);
  });
</script>

</body>
</html>
