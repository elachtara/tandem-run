<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Waitlist — Neighborhood Map · Tandem Run</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; }
    #map { width: 100vw; height: 100vh; }

    .info-card {
      position: absolute;
      top: 1.5rem; left: 1.5rem;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(28, 63, 122, 0.15);
      border-radius: 6px;
      padding: 1.25rem 1.5rem;
      max-width: 240px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .info-card h1 { font-size: 0.95rem; font-weight: 600; color: #1c3f7a; margin-bottom: 0.3rem; }
    .info-card p  { font-size: 0.73rem; color: #78726a; line-height: 1.6; margin-bottom: 1rem; }

    .legend-title { font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; color: #1c3f7a; font-weight: 600; margin-bottom: 0.5rem; }
    .legend-bar {
      height: 10px; border-radius: 5px;
      background: linear-gradient(to right, rgba(28,63,122,0.08), rgba(28,63,122,0.4), rgba(28,63,122,0.85));
      margin-bottom: 0.3rem;
    }
    .legend-labels { display: flex; justify-content: space-between; font-size: 0.68rem; color: #aaa; }
    .legend-note { font-size: 0.62rem; color: #bbb; margin-top: 0.6rem; }

    .bubble-tooltip {
      background: white;
      border: 1px solid rgba(28, 63, 122, 0.2);
      border-radius: 4px;
      padding: 0.35rem 0.6rem;
      font-size: 0.76rem;
      color: #1a1814;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .bubble-tooltip::before { display: none; }
    .bubble-tooltip strong { color: #1c3f7a; display: block; }

    .leaflet-control-zoom a { background: white !important; color: #1c3f7a !important; border-color: rgba(28,63,122,0.2) !important; }
    .leaflet-control-attribution { font-size: 9px !important; }
  </style>
</head>
<body>

<div id="map"></div>

<div class="info-card">
  <h1>Where are they?</h1>
  <p>First 100 waitlist sign-ups. Darker shading = more signups. Hover a neighborhood for exact count.</p>
  <div class="legend-title">Signup density</div>
  <div class="legend-bar"></div>
  <div class="legend-labels"><span>Fewer</span><span>More</span></div>
  <div class="legend-note">● Somerville &amp; suburbs shown as dots</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const map = L.map('map', {
    center: [42.355, -71.09],
    zoom: 12,
    zoomControl: true,
    scrollWheelZoom: true,
    attributionControl: true
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://carto.com/">CARTO</a> &copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  // ── Waitlist data ──────────────────────────────────────────────────────────

  const signups = {
    'Charlestown':        15,
    'North End':          12,
    'Beacon Hill':         9,
    'Brighton':            8,
    'East Cambridge':      6,
    'East Boston':         5,
    'Allston':             3,
    'Dorchester':          3,
    'Jamaica Plain':       3,
    'Davis Square':        2,
    'West Cambridge':      2,
    'Cambridgeport':       2,
    'Assembly Row':        2,
    'South Boston':        2,
    'Hingham':             2,
    'Seaport':             1,
    'Winter Hill':         1,
    'Inman Square':        1,
    'Cambridge Crossing':  1,
    'Kendall Square':      1,
    'South End':           1,
    'Union Square':        1,
    'Medford':             1,
    'Newton':              1,
    'Back Bay':            1,
    'Brookline':           1,
    'Porter Square':       1,
    'Mid Cambridge':       1,
  };

  const maxCount = 15;

  // ── Boston GeoJSON name → waitlist name ───────────────────────────────────
  // Only entries that differ from the GeoJSON name are listed.
  const bostonNameMap = {
    'South Boston Waterfront': 'Seaport',
  };

  // ── Cambridge CDD neighborhoods → aggregated waitlist data ────────────────
  // Some CDD polygons cover multiple colloquial neighborhoods.
  const cambridgeData = {
    'East Cambridge':       { display: 'East Cambridge',  count: signups['East Cambridge'] + signups['Cambridge Crossing'] + signups['Kendall Square'] },
    'Cambridgeport':        { display: 'Cambridgeport',   count: signups['Cambridgeport'] },
    'West Cambridge':       { display: 'West Cambridge',  count: signups['West Cambridge'] },
    'Mid-Cambridge':        { display: 'Mid Cambridge',   count: signups['Mid Cambridge'] },
    'Wellington-Harrington':{ display: 'Inman Square',    count: signups['Inman Square'] },
    'Neighborhood Nine':    { display: 'Porter Square',   count: signups['Porter Square'] },
  };

  // ── Somerville + suburbs — dot markers (no polygon data available) ─────────
  const dotMarkers = [
    { name: 'Davis Square',  lat: 42.3967, lon: -71.1222, count: signups['Davis Square'] },
    { name: 'Assembly Row',  lat: 42.3953, lon: -71.0773, count: signups['Assembly Row'] },
    { name: 'Winter Hill',   lat: 42.3928, lon: -71.0984, count: signups['Winter Hill'] },
    { name: 'Union Square',  lat: 42.3788, lon: -71.0988, count: signups['Union Square'] },
    { name: 'Hingham',       lat: 42.2421, lon: -70.8900, count: signups['Hingham'] },
    { name: 'Medford',       lat: 42.4184, lon: -71.1062, count: signups['Medford'] },
    { name: 'Newton',        lat: 42.3370, lon: -71.2092, count: signups['Newton'] },
    { name: 'Brookline',     lat: 42.3317, lon: -71.1213, count: signups['Brookline'] },
  ];

  // ── Helpers ───────────────────────────────────────────────────────────────

  function fillColor(count) {
    if (!count) return 'rgba(28,63,122,0.05)';
    const t = Math.sqrt(count) / Math.sqrt(maxCount);
    const opacity = (0.12 + t * 0.80).toFixed(2);
    return `rgba(28,63,122,${opacity})`;
  }

  function polyStyle(count) {
    return {
      fillColor: fillColor(count),
      fillOpacity: 1,
      color: 'rgba(28,63,122,0.22)',
      weight: 0.8,
    };
  }

  function tooltipHtml(name, count) {
    return `<strong>${name}</strong>${count} signup${count !== 1 ? 's' : ''}`;
  }

  // ── Boston neighborhoods ───────────────────────────────────────────────────

  fetch('boston-neighborhoods.geojson')
    .then(r => r.json())
    .then(data => {
      L.geoJSON(data, {
        style: feature => {
          const geoName = feature.properties.name;
          const name = bostonNameMap[geoName] || geoName;
          return polyStyle(signups[name] || 0);
        },
        onEachFeature: (feature, layer) => {
          const geoName = feature.properties.name;
          const name = bostonNameMap[geoName] || geoName;
          const count = signups[name] || 0;
          layer.bindTooltip(
            tooltipHtml(name, count),
            { sticky: true, direction: 'top', className: 'bubble-tooltip' }
          );
          layer.on('mouseover', function () { this.setStyle({ weight: 1.5, color: 'rgba(28,63,122,0.5)' }); });
          layer.on('mouseout',  function () { this.setStyle({ weight: 0.8, color: 'rgba(28,63,122,0.22)' }); });
        }
      }).addTo(map);
    })
    .catch(e => console.warn('Boston GeoJSON failed:', e));

  // ── Cambridge neighborhoods ────────────────────────────────────────────────

  fetch('cambridge-neighborhoods.geojson')
    .then(r => r.json())
    .then(data => {
      L.geoJSON(data, {
        style: feature => {
          const geoName = feature.properties.NAME;
          const info = cambridgeData[geoName];
          return polyStyle(info ? info.count : 0);
        },
        onEachFeature: (feature, layer) => {
          const geoName = feature.properties.NAME;
          const info = cambridgeData[geoName];
          const display = info ? info.display : geoName;
          const count   = info ? info.count : 0;
          layer.bindTooltip(
            tooltipHtml(display, count),
            { sticky: true, direction: 'top', className: 'bubble-tooltip' }
          );
          layer.on('mouseover', function () { this.setStyle({ weight: 1.5, color: 'rgba(28,63,122,0.5)' }); });
          layer.on('mouseout',  function () { this.setStyle({ weight: 0.8, color: 'rgba(28,63,122,0.22)' }); });
        }
      }).addTo(map);
    })
    .catch(e => console.warn('Cambridge GeoJSON failed:', e));

  // ── Dot markers for Somerville + suburbs ──────────────────────────────────

  dotMarkers.forEach(({ name, lat, lon, count }) => {
    L.circleMarker([lat, lon], {
      radius: 5,
      color: '#1c3f7a',
      weight: 1.5,
      fillColor: fillColor(count),
      fillOpacity: 0.9,
    })
    .bindTooltip(
      tooltipHtml(name, count),
      { sticky: true, direction: 'top', className: 'bubble-tooltip' }
    )
    .addTo(map);
  });
</script>

</body>
</html>
