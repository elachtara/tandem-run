    'Medford':             1,
    'Newton':              1,
    'Back Bay':            1,
    'Brookline':           1,
    'Porter Square':       1,
    'Mid Cambridge':       1,
  };

  const maxCount = 15;

  // ── Name mappings ─────────────────────────────────────────────────────────

  const bostonNameMap = {
    'South Boston Waterfront': 'Seaport',
  };

  // Cambridge CDD polygons → aggregated waitlist data
  const cambridgeData = {
    'East Cambridge':        { display: 'East Cambridge', count: signups['East Cambridge'] + signups['Cambridge Crossing'] + signups['Kendall Square'] },
    'Cambridgeport':         { display: 'Cambridgeport',  count: signups['Cambridgeport'] },
    'West Cambridge':        { display: 'West Cambridge', count: signups['West Cambridge'] },
    'Mid-Cambridge':         { display: 'Mid Cambridge',  count: signups['Mid Cambridge'] },
    'Wellington-Harrington': { display: 'Inman Square',   count: signups['Inman Square'] },
    'Neighborhood Nine':     { display: 'Porter Square',  count: signups['Porter Square'] },
  };

  // Somerville polygons → waitlist data (title property)
  const somervilleData = {
    'Davis Square':    { display: 'Davis Square',  count: signups['Davis Square'] },
    'Winter Hill':     { display: 'Winter Hill',   count: signups['Winter Hill'] },
    'Assembly Square': { display: 'Assembly Row',  count: signups['Assembly Row'] },
  };

  // Suburbs + Union Square (no polygon available) — dot markers
  const dotMarkers = [
    { name: 'Union Square', lat: 42.3788, lon: -71.0988, count: signups['Union Square'] },
    { name: 'Hingham',      lat: 42.2421, lon: -70.8900, count: signups['Hingham'] },
    { name: 'Medford',      lat: 42.4184, lon: -71.1062, count: signups['Medford'] },
    { name: 'Newton',       lat: 42.3370, lon: -71.2092, count: signups['Newton'] },
    { name: 'Brookline',    lat: 42.3317, lon: -71.1213, count: signups['Brookline'] },
  ];

  // ── Helpers ───────────────────────────────────────────────────────────────

  function fillColor(count) {
    if (!count) return 'rgba(28,63,122,0.05)';
    const t = Math.sqrt(count) / Math.sqrt(maxCount);
    return `rgba(28,63,122,${(0.12 + t * 0.80).toFixed(2)})`;
  }

  function polyStyle(count) {
    return { fillColor: fillColor(count), fillOpacity: 1, color: 'rgba(28,63,122,0.22)', weight: 0.8 };
  }

  function tooltipHtml(name, count) {
    return `<strong>${name}</strong>${count} signup${count !== 1 ? 's' : ''}`;
  }

  function addHover(layer) {
    layer.on('mouseover', () => layer.setStyle({ weight: 1.5, color: 'rgba(28,63,122,0.5)' }));
    layer.on('mouseout',  () => layer.setStyle({ weight: 0.8, color: 'rgba(28,63,122,0.22)' }));
  }

  function addGeoJSON(geojson, getName, getData) {
    L.geoJSON(geojson, {
      style: feature => polyStyle(getData(getName(feature)).count || 0),
      onEachFeature: (feature, layer) => {
        const { display, count } = getData(getName(feature));
        layer.bindTooltip(tooltipHtml(display, count || 0), { sticky: true, direction: 'top', className: 'bubble-tooltip' });
        addHover(layer);
      }
    }).addTo(map);
  }

  // ── Render layers ─────────────────────────────────────────────────────────

  addGeoJSON(
    BOSTON_GEO,
    f => f.properties.name,
    geoName => {
      const name = bostonNameMap[geoName] || geoName;
      return { display: name, count: signups[name] || 0 };
    }
  );

  addGeoJSON(
    CAMBRIDGE_GEO,
    f => f.properties.NAME,
    geoName => cambridgeData[geoName] || { display: geoName, count: 0 }
  );

  addGeoJSON(
    SOMERVILLE_GEO,
    f => f.properties.title,
    geoName => somervilleData[geoName] || { display: geoName, count: 0 }
  );

  // ── Dot markers ───────────────────────────────────────────────────────────

  dotMarkers.forEach(({ name, lat, lon, count }) => {
    L.circleMarker([lat, lon], {
      radius: 5, color: '#1c3f7a', weight: 1.5,
      fillColor: fillColor(count), fillOpacity: 0.9,
    })
    .bindTooltip(tooltipHtml(name, count), { sticky: true, direction: 'top', className: 'bubble-tooltip' })
    .addTo(map);
  });
</script>

</body>
</html>
