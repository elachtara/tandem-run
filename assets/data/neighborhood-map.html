  }

  function tooltipHtml(name, count) {
    return `<strong>${name}</strong>${count} signup${count !== 1 ? 's' : ''}`;
  }

  function addHover(layer) {
    layer.on('mouseover', () => layer.setStyle({ weight: 1.5, color: 'rgba(28,63,122,0.5)' }));
    layer.on('mouseout',  () => layer.setStyle({ weight: 0.8, color: 'rgba(28,63,122,0.22)' }));
  }

  // ── Boston ────────────────────────────────────────────────────────────────

  L.geoJSON(BOSTON_GEO, {
    filter: feature => bostonOverrides[feature.properties.name] !== null,
    style: feature => {
      const info = bostonOverrides[feature.properties.name] || { keys: [feature.properties.name] };
      return polyStyle(countForKeys(info.keys));
    },
    onEachFeature: (feature, layer) => {
      const override = bostonOverrides[feature.properties.name];
      const info = override || { display: feature.properties.name, keys: [feature.properties.name] };
      layer.bindTooltip(tooltipHtml(info.display, countForKeys(info.keys)), { sticky: true, direction: 'top', className: 'bubble-tooltip' });
      addHover(layer);
    }
  }).addTo(map);

  // ── Cambridge ─────────────────────────────────────────────────────────────

  L.geoJSON(CAMBRIDGE_GEO, {
    style: feature => {
      const info = cambridgeData[feature.properties.NAME];
      return polyStyle(info ? countForKeys(info.keys) : 0);
    },
    onEachFeature: (feature, layer) => {
      const info = cambridgeData[feature.properties.NAME];
      const display = info ? info.display : feature.properties.NAME;
      const count = info ? countForKeys(info.keys) : 0;
      layer.bindTooltip(tooltipHtml(display, count), { sticky: true, direction: 'top', className: 'bubble-tooltip' });
      addHover(layer);
    }
  }).addTo(map);

  // ── Somerville ────────────────────────────────────────────────────────────

  L.geoJSON(SOMERVILLE_GEO, {
    style: feature => {
      const info = somervilleData[feature.properties.title];
      return polyStyle(info ? countForKeys(info.keys) : 0);
    },
    onEachFeature: (feature, layer) => {
      const info = somervilleData[feature.properties.title];
      const display = info ? info.display : feature.properties.title;
      const count = info ? countForKeys(info.keys) : 0;
      layer.bindTooltip(tooltipHtml(display, count), { sticky: true, direction: 'top', className: 'bubble-tooltip' });
      addHover(layer);
    }
  }).addTo(map);

  // ── Inner suburbs (Brookline, Newton, Medford, Quincy) ───────────────────

  L.geoJSON(SUBURBS_GEO, {
    style: feature => polyStyle(signups[feature.properties.name] || 0),
    onEachFeature: (feature, layer) => {
      const name = feature.properties.name;
      const count = signups[name] || 0;
      layer.bindTooltip(tooltipHtml(name, count), { sticky: true, direction: 'top', className: 'bubble-tooltip' });
      addHover(layer);
    }
  }).addTo(map);

  // ── South Shore + Watertown dot markers ──────────────────────────────────

  dotMarkers.forEach(({ name, lat, lon }) => {
    const count = signups[name] || 0;
    L.circleMarker([lat, lon], {
      radius: 5, color: '#1c3f7a', weight: 1.5,
      fillColor: fillColor(count), fillOpacity: 0.9,
    })
    .bindTooltip(tooltipHtml(name, count), { sticky: true, direction: 'top', className: 'bubble-tooltip' })
    .addTo(map);
  });
</script>

</body>
</html>
